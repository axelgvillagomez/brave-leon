<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <title>BRAVE LEON — AR Portfolio</title>
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=1" />
        <link rel="stylesheet" href="css/nft-style.css" />
        <style>
            body { background: #080808; margin: 0; overflow: hidden; }
            a.ui.marker {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(8,8,8,0.9);
                color: #C9A96E;
                border: 1px solid #C9A96E;
                padding: 9px 22px;
                border-radius: 2px;
                font-family: 'Helvetica Neue', Helvetica, sans-serif;
                font-size: 11px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                text-decoration: none;
                z-index: 9999;
                white-space: nowrap;
            }
            a.ui.marker:active { background: #C9A96E; color: #080808; }
            #arvideo { display: none; }
        </style>
    </head>

    <body>
        <a href="tarjeta.html" class="ui marker" target="_blank">
            Ver Tarjeta Marcador
        </a>

        <!-- Video element -->
        <video id="arvideo" loop autoplay muted playsinline crossorigin="anonymous">
            <source src="portfolio.mp4" type="video/mp4" />
        </video>

        <script type="importmap">
            {
                "imports": {
                    "three": "./js/three.module.min.js",
                    "arnft-threejs": "./js/ARnftThreejs.mjs",
                    "arnft": "./js/ARnft.mjs"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import arnft from "arnft";
            const { ARnft } = arnft;
            import ARnftThreejs from "arnft-threejs";
            const { SceneRendererTJS, NFTaddTJS } = ARnftThreejs;

            let width = window.innerWidth;
            let height = window.innerHeight;

            // Initialize ARnft with the brave_leon_card marker
            ARnft.init(640, 480, [["brave-leon/nft/pinball"]], [["axel"]], "config.json", false)
                .then((nft) => {
                    // Create video texture
                    let video = document.getElementById("arvideo");
                    // Ensure video is playing
                    video.play();
                    
                    let texture = new THREE.VideoTexture(video);
                    texture.minFilter = THREE.LinearFilter;
                    texture.magFilter = THREE.LinearFilter;
                    texture.format = THREE.RGBAFormat;

                    // Create material and mesh for the video
                    let mat = new THREE.MeshBasicMaterial({
                        map: texture,
                        side: THREE.DoubleSide
                    });
                    
                    // The business card has a landscape aspect ratio (9x5 cm -> ~ 1.8)
                    let planeGeom = new THREE.PlaneGeometry(180, 100);
                    let videoMesh = new THREE.Mesh(planeGeom, mat);
                    
                    // Rotate the plane so it lies flat on the marker
                    videoMesh.rotation.x = Math.PI; 
                    
                    // Scale it so it fits the marker well
                    videoMesh.scale.set(1.5, 1.5, 1.5);
                    videoMesh.position.y = 50;

                    document.addEventListener("containerEvent", function (ev) {
                        let canvas = document.getElementById("canvas");
                        let fov = (0.8 * 180) / Math.PI;
                        let ratio = 640 / 480;
                        let config = {
                            renderer: {
                                alpha: true,
                                antialias: true,
                                context: null,
                                precision: "mediump",
                                premultipliedAlpha: true,
                                stencil: true,
                                depth: true,
                                logarithmicDepthBuffer: true,
                            },
                            camera: {
                                fov: fov,
                                ratio: ratio,
                                near: 0.01,
                                far: 1000,
                            },
                        };

                        let sceneThreejs = new SceneRendererTJS(config, canvas, nft.uuid, true);
                        sceneThreejs.initRenderer();

                        let nftAddTJS = new NFTaddTJS(nft.uuid);
                        // Add the video mesh to the marker
                        nftAddTJS.add(videoMesh, "axel", false);

                        const tick = () => {
                            sceneThreejs.draw();
                            window.requestAnimationFrame(tick);
                        };
                        tick();
                    });
                })
                .catch((error) => {
                    console.error("Error initializing ARnft:", error);
                });
        </script>
    </body>
</html>
